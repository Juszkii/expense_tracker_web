<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">

        <div class="header">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Expense Tracker Logo" class="logo">
            <p class="subtitle">Track your spending with style</p>
        </div>

        <h2>Expenses</h2>

        <div class="expenses">
            {% for exp in expenses %}
                <div class="expense-item">
                    <div class="expense-info">
                        <strong>{{ exp[1] }}$</strong> - {{ exp[2] }}<br>
                        <small>{{ exp[3] }} | {{ exp[4] }}</small>
                    </div>

                    <form method="POST" action="/delete" class="delete-form">
                        <input type="hidden" name="id" value="{{ exp[0] }}">
                        <button type="submit" class="delete-btn">Delete</button>
                    </form>
                </div>
            {% endfor %}
        </div>

        <h2>Add Expense</h2>

        <form method="POST" class="add-expense-form">
            <input type="number" step="0.01" name="amount" placeholder="Amount" required>
            <input type="text" name="category" placeholder="Category" required>
            <input type="text" name="description" placeholder="Description">
            <input type="text" name="date" placeholder="YYYY-MM-DD" required>

            <button type="submit" class="add-btn">Add</button>
        </form>

    </div>
</body>
</html>
